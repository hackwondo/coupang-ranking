<svg viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg" style="background:#FFFBF0;border-radius:12px">
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">Bass 확산 모델 S-Curve</text>
  <text x="300" y="50" text-anchor="middle" font-size="11" fill="#868E96">Bass, F.M. (1969) Management Science</text>
  <!-- Axes -->
  <line x1="60" y1="280" x2="560" y2="280" stroke="#ADB5BD" stroke-width="1.5"/>
  <line x1="60" y1="280" x2="60" y2="60" stroke="#ADB5BD" stroke-width="1.5"/>
  <text x="310" y="310" text-anchor="middle" font-size="12" fill="#495057">시간 (Time)</text>
  <text x="25" y="170" text-anchor="middle" font-size="12" fill="#495057" transform="rotate(-90,25,170)">누적 채택자 수</text>
  <!-- S-Curve -->
  <path d="M60,275 C100,273 140,270 180,260 C220,245 260,210 300,160 C340,110 380,80 420,72 C460,68 500,66 540,65" fill="none" stroke="#E8590C" stroke-width="3"/>
  <!-- Bell curve (adoption rate) -->
  <path d="M60,278 C100,276 140,270 180,250 C220,210 260,150 300,100 C320,120 340,150 380,200 C420,240 460,265 540,278" fill="rgba(51,154,240,0.15)" stroke="#339AF0" stroke-width="2"/>
  <!-- Labels -->
  <rect x="80" y="240" width="70" height="22" rx="4" fill="#E7F5FF"/>
  <text x="115" y="255" text-anchor="middle" font-size="10" fill="#1971C2">혁신자 2.5%</text>
  <rect x="165" y="200" width="90" height="22" rx="4" fill="#D3F9D8"/>
  <text x="210" y="215" text-anchor="middle" font-size="10" fill="#2B8A3E">얼리어답터 13.5%</text>
  <rect x="265" y="100" width="80" height="22" rx="4" fill="#FFF3BF"/>
  <text x="305" y="115" text-anchor="middle" font-size="10" fill="#E67700">전기다수 34%</text>
  <rect x="370" y="160" width="80" height="22" rx="4" fill="#FFE3E3"/>
  <text x="410" y="175" text-anchor="middle" font-size="10" fill="#C92A2A">후기다수 34%</text>
  <rect x="460" y="230" width="75" height="22" rx="4" fill="#F3F0FF"/>
  <text x="497" y="245" text-anchor="middle" font-size="10" fill="#7048E8">지각자 16%</text>
  <!-- Legend -->
  <line x1="70" y1="330" x2="90" y2="330" stroke="#E8590C" stroke-width="3"/>
  <text x="95" y="334" font-size="11" fill="#495057">누적 채택 (S-Curve)</text>
  <line x1="250" y1="330" x2="270" y2="330" stroke="#339AF0" stroke-width="2"/>
  <text x="275" y="334" font-size="11" fill="#495057">채택률 (Bell Curve)</text>
</svg>
