<svg viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg" style="background:#FFFBF0;border-radius:12px">
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">Rogers 혁신확산 이론 — 글로벌 트렌드 래그</text>
  <text x="300" y="50" text-anchor="middle" font-size="11" fill="#868E96">Rogers, E.M. (1962) Diffusion of Innovations</text>
  <!-- US curve -->
  <path d="M60,260 C100,255 130,230 160,180 C190,120 210,90 240,85 C270,90 300,120 330,180 C360,230 400,255 440,260" fill="rgba(51,154,240,0.15)" stroke="#339AF0" stroke-width="2.5"/>
  <text x="240" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#339AF0">🇺🇸 미국 (선행)</text>
  <!-- KR curve (lagged) -->
  <path d="M180,260 C220,255 250,230 280,180 C310,120 330,90 360,85 C390,90 420,120 450,180 C480,230 520,255 560,260" fill="rgba(232,89,12,0.15)" stroke="#E8590C" stroke-width="2.5"/>
  <text x="360" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#E8590C">🇰🇷 한국 (후행)</text>
  <!-- Time lag arrow -->
  <line x1="240" y1="92" x2="355" y2="92" stroke="#7048E8" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="#7048E8"/></marker></defs>
  <text x="298" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#7048E8">2~3개월 래그</text>
  <!-- Axis -->
  <line x1="50" y1="265" x2="570" y2="265" stroke="#ADB5BD" stroke-width="1"/>
  <text x="310" y="285" text-anchor="middle" font-size="12" fill="#495057">시간 →</text>
  <!-- Example -->
  <rect x="60" y="300" width="500" height="35" rx="8" fill="#F3F0FF"/>
  <text x="310" y="322" text-anchor="middle" font-size="12" fill="#7048E8">예: 스탠리 텀블러 — 미국 2025.03 피크 → 한국 2025.06 피크 (3개월 래그)</text>
</svg>
